<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMD Premiership 2026 — Analytics Dashboard</title>
<style>
  :root {
    --purple:#7B2FBE; --gold:#F5A623; --dark:#0a0a12;
    --card:#13131f; --card2:#1a1a2a; --border:#222236;
    --text:#e8e8f0; --muted:#888aaa; --green:#2ecc71;
    --red:#e74c3c; --blue:#3498db;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

  /* HERO */
  .hero{background:linear-gradient(135deg,#1a0430 0%,#2d0a5c 50%,#1a0430 100%);padding:32px 24px;text-align:center;border-bottom:2px solid var(--purple);position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%237B2FBE' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
  .hero-badge{display:inline-block;background:rgba(123,47,190,0.3);border:1px solid var(--purple);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
  .hero h1{font-size:clamp(22px,4vw,40px);font-weight:900;letter-spacing:-1px;color:#fff;text-shadow:0 0 40px rgba(123,47,190,0.8);}
  .hero h1 span{color:var(--gold);}
  .hero-sub{color:var(--muted);font-size:14px;margin-top:6px;}
  .hero-stats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-top:24px;}
  .hs{background:rgba(123,47,190,0.15);border:1px solid rgba(123,47,190,0.3);border-radius:12px;padding:12px 20px;text-align:center;}
  .hs-val{font-size:24px;font-weight:900;color:var(--gold);}
  .hs-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .r4-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(90deg,#d4380d,#ff6b35);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:800;letter-spacing:1px;color:#fff;margin-top:14px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,56,13,0.4);}50%{box-shadow:0 0 0 8px rgba(212,56,13,0);}}

  /* NAV TABS */
  .nav{display:flex;background:#0d0d1a;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:0;z-index:100;}
  .tab-btn{padding:14px 20px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:.5px;transition:all .2s;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--gold);border-bottom-color:var(--purple);}

  /* PANELS */
  .panel{display:none;padding:24px;max-width:1200px;margin:0 auto;}
  .panel.active{display:block;}

  /* CARDS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
  .card-title{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .card-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
  .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}

  /* LADDER */
  .ladder-table{width:100%;border-collapse:collapse;font-size:13px;}
  .ladder-table th{background:var(--card2);color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:10px 8px;text-align:center;border-bottom:1px solid var(--border);}
  .ladder-table th:first-child{text-align:left;padding-left:14px;}
  .ladder-table td{padding:10px 8px;text-align:center;border-bottom:1px solid rgba(34,34,54,.5);}
  .ladder-table td:first-child{text-align:left;padding-left:14px;}
  .ladder-table tr:hover td{background:rgba(123,47,190,.07);}
  .ladder-table tr.finals td{background:rgba(123,47,190,.06);}
  .rank-num{color:var(--muted);font-size:12px;width:24px;display:inline-block;}
  .team-name-cell{font-weight:700;}
  .pts-cell{font-weight:900;color:var(--gold);font-size:15px;}
  .diff-pos{color:var(--green);}
  .diff-neg{color:var(--red);}
  .finals-divider td{padding:0;}
  .finals-line{border:none;border-top:2px dashed var(--purple);height:0;display:block;position:relative;}
  .finals-line::before{content:'— Finals Line —';position:absolute;left:50%;transform:translateX(-50%);top:-9px;font-size:10px;background:var(--card);padding:0 8px;color:var(--purple);white-space:nowrap;font-weight:700;letter-spacing:1px;}
  .team-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .form-pill{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:10px;font-weight:800;margin:1px;}
  .form-W{background:rgba(46,204,113,.2);color:#2ecc71;border:1px solid rgba(46,204,113,.4);}
  .form-L{background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid rgba(231,76,60,.4);}
  .form-B{background:rgba(136,138,170,.15);color:var(--muted);border:1px solid rgba(136,138,170,.2);}

  /* RESULTS */
  .match-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
  .match-teams{flex:1;display:flex;align-items:center;gap:8px;}
  .match-team{flex:1;font-weight:700;font-size:14px;}
  .match-team.winner{color:var(--gold);}
  .match-team.home{text-align:right;}
  .match-score{background:var(--card);border-radius:8px;padding:6px 14px;text-align:center;min-width:80px;font-size:16px;font-weight:900;letter-spacing:1px;}
  .match-score span:first-child{color:var(--gold);}
  .match-margin{font-size:11px;color:var(--muted);text-align:center;margin-top:2px;}
  .match-meta{font-size:11px;color:var(--muted);}
  .round-header{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--purple);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:10px;margin-top:16px;}
  .round-header:first-child{margin-top:0;}

  /* UPCOMING MATCH PREVIEW */
  .preview-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;}
  .preview-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--purple),var(--gold));}
  .preview-card.fire::before{background:linear-gradient(180deg,#e74c3c,#F5A623);}
  .preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .preview-time{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--gold);text-transform:uppercase;}
  .preview-matchup{font-size:18px;font-weight:900;color:#fff;}
  .preview-matchup .vs{color:var(--muted);font-size:13px;font-weight:400;margin:0 8px;}
  .clash-badge{background:rgba(231,76,60,.2);border:1px solid rgba(231,76,60,.5);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;color:#e74c3c;}
  .h2h-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;margin:12px 0;align-items:center;}
  .h2h-team{background:var(--card);border-radius:8px;padding:10px;text-align:center;}
  .h2h-team-name{font-size:12px;font-weight:700;margin-bottom:6px;}
  .h2h-stats{display:flex;justify-content:space-around;}
  .h2h-stat{text-align:center;}
  .h2h-stat-val{font-size:16px;font-weight:900;color:var(--gold);}
  .h2h-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;}
  .h2h-vs{text-align:center;color:var(--muted);font-size:12px;font-weight:700;}
  .preview-tips{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .tip-box{background:var(--card);border-radius:8px;padding:10px;}
  .tip-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--purple);margin-bottom:6px;}
  .tip-text{font-size:12px;color:var(--muted);line-height:1.5;}
  .prediction-box{background:linear-gradient(90deg,rgba(123,47,190,.2),rgba(245,166,35,.1));border:1px solid rgba(123,47,190,.4);border-radius:8px;padding:10px 14px;margin-top:12px;display:flex;align-items:center;justify-content:space-between;}
  .pred-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
  .pred-pick{font-size:15px;font-weight:900;color:var(--gold);}
  .pred-conf{font-size:11px;color:var(--muted);}

  /* TEAM SCOUT CARDS */
  .scout-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;position:relative;overflow:hidden;}
  .scout-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .scout-dot{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0;}
  .scout-name{font-size:18px;font-weight:900;}
  .scout-pos{font-size:12px;color:var(--muted);}
  .scout-record{display:flex;gap:8px;margin-bottom:14px;}
  .scout-tag{background:var(--card2);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;}
  .scout-tag.wins{color:var(--green);}
  .scout-tag.losses{color:var(--red);}
  .scout-tag.pts{color:var(--gold);}

  .scout-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px;}
  .scout-section{background:var(--card2);border-radius:8px;padding:12px;}
  .scout-section h4{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .scout-section ul{list-style:none;padding:0;}
  .scout-section ul li{font-size:12px;color:var(--text);padding:3px 0;border-bottom:1px solid rgba(34,34,54,.4);line-height:1.4;}
  .scout-section ul li:last-child{border-bottom:none;}
  .scout-section ul li::before{content:'›';margin-right:6px;color:var(--purple);}
  .exploit-section{background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.2);border-radius:8px;padding:12px;}
  .exploit-section h4{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#e74c3c;margin-bottom:8px;}
  .exploit-section ul li::before{color:#e74c3c;}

  /* RATING BARS */
  .rating-row{display:flex;align-items:center;gap:10px;margin:6px 0;}
  .rating-label{font-size:11px;color:var(--muted);width:80px;flex-shrink:0;}
  .rating-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
  .rating-bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
  .rating-val{font-size:11px;font-weight:700;width:30px;text-align:right;}

  /* CHARTS */
  .chart-container{position:relative;width:100%;overflow:auto;}
  svg text{font-family:'Segoe UI',system-ui,sans-serif;}

  /* H2H MATRIX */
  .matrix-table{border-collapse:collapse;font-size:11px;width:100%;}
  .matrix-table th,.matrix-table td{border:1px solid var(--border);padding:5px 4px;text-align:center;min-width:30px;}
  .matrix-table th{background:var(--card2);color:var(--muted);font-size:10px;}
  .matrix-table .row-header{text-align:left;font-weight:700;padding-left:8px;min-width:100px;font-size:11px;}
  .matrix-W{background:rgba(46,204,113,.2);color:#2ecc71;font-weight:700;}
  .matrix-L{background:rgba(231,76,60,.2);color:#e74c3c;font-weight:700;}
  .matrix-self{background:rgba(123,47,190,.15);color:var(--muted);}
  .matrix-none{color:var(--border);}

  /* STAT HIGHLIGHT */
  .stat-highlight{display:flex;justify-content:space-around;flex-wrap:wrap;gap:12px;margin-top:10px;}
  .sh{text-align:center;padding:12px;background:var(--card2);border-radius:10px;min-width:100px;flex:1;}
  .sh-val{font-size:20px;font-weight:900;color:var(--gold);}
  .sh-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}

  /* GENERAL */
  .badge{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;}
  .badge-purple{background:rgba(123,47,190,.2);color:var(--purple);border:1px solid rgba(123,47,190,.3);}
  .badge-gold{background:rgba(245,166,35,.15);color:var(--gold);border:1px solid rgba(245,166,35,.3);}
  .badge-red{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3);}
  .badge-green{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);}
  @media(max-width:600px){.preview-tips{grid-template-columns:1fr;}.hero-stats{gap:10px;}.hs{padding:10px 14px;}}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-badge">QRL 2026</div>
  <h1>BMD <span>Premiership</span></h1>
  <div class="hero-sub">Women's Rugby League · Queensland · Analytics Dashboard</div>
  <div class="hero-stats">
    <div class="hs"><div class="hs-val">4</div><div class="hs-lbl">Rounds In Play</div></div>
    <div class="hs"><div class="hs-val">17</div><div class="hs-lbl">R1–R3 Complete</div></div>
    <div class="hs"><div class="hs-val" id="h-avg">—</div><div class="hs-lbl">Avg Score/Team</div></div>
    <div class="hs"><div class="hs-val" id="h-top">—</div><div class="hs-lbl">Top Attack</div></div>
    <div class="hs"><div class="hs-val" id="h-def">—</div><div class="hs-lbl">Best Defence</div></div>
  </div>
  <div><div class="r4-badge">⚡ ROUND 4 — IN PROGRESS</div></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="tab-btn active" onclick="showTab('overview')">📊 Overview</button>
  <button class="tab-btn" onclick="showTab('r4')">📋 R4 Update</button>
  <button class="tab-btn" onclick="showTab('ladder')">📋 Ladder</button>
  <button class="tab-btn" onclick="showTab('charts')">📈 Charts</button>
  <button class="tab-btn" onclick="showTab('scouts')">🎯 Scout Reports</button>
  <button class="tab-btn" onclick="showTab('results')">🏉 Results</button>
  <button class="tab-btn" onclick="showTab('matrix')">🔲 H2H Matrix</button>
  <button class="tab-btn" onclick="showTab('profiles')">👥 Profiles</button>
  <button class="tab-btn" onclick="showTab('attack')">⚔️ Attack</button>
  <button class="tab-btn" onclick="showTab('defence')">🛡️ Defence</button>
  <button class="tab-btn" onclick="showTab('tryzone')">🗺️ Try Zone</button>
</div>

<!-- PANELS -->
<div id="panel-overview" class="panel active"></div>
<div id="panel-r4" class="panel"></div>
<div id="panel-ladder" class="panel"></div>
<div id="panel-charts" class="panel"></div>
<div id="panel-scouts" class="panel"></div>
<div id="panel-results" class="panel"></div>
<div id="panel-matrix" class="panel"></div>
<div id="panel-profiles" class="panel"></div>
<div id="panel-attack" class="panel"></div>
<div id="panel-defence" class="panel"></div>
<div id="panel-tryzone" class="panel"></div>

<script>
// ===================== DATA =====================
const TEAM_COLORS = {
  'Bears':'#C5A900','Jets':'#0099CC','Tigers':'#E87722',
  'Magpies':'#555555','Devils':'#CC0000','Clydesdales':'#8B4513',
  'Capras':'#8B0000','Falcons':'#0052A5','Cutters':'#007A33',
  'Pride':'#7B2FBE','Seagulls':'#004BA0','WM Seagulls':'#1A7A3C',
};
const TEAM_SHORT = {
  'Bears':'BRS','Jets':'JTS','Tigers':'TIG','Magpies':'MAG',
  'Devils':'DVL','Clydesdales':'CLY','Capras':'CAP','Falcons':'FAL',
  'Cutters':'CUT','Pride':'PRI','Seagulls':'SEA','WM Seagulls':'WMS',
};

const BMD_ROUNDS = [
  {round:1, games:[
    {home:'Tigers',away:'Devils',hs:16,as:18},
    {home:'Pride',away:'Magpies',hs:20,as:40},
    {home:'Seagulls',away:'Clydesdales',hs:12,as:26},
    {home:'Bears',away:'Falcons',hs:6,as:4},
    {home:'Jets',away:'Cutters',hs:34,as:14},
    {home:'WM Seagulls',away:'Capras',hs:6,as:48},
  ]},
  {round:2, games:[
    {home:'Tigers',away:'Falcons',hs:32,as:10},
    {home:'Capras',away:'Clydesdales',hs:20,as:24},
    {home:'Seagulls',away:'Pride',hs:14,as:24},
    {home:'Cutters',away:'Magpies',hs:28,as:12},
    {home:'Devils',away:'Bears',hs:10,as:12},
    {home:'WM Seagulls',away:'Jets',hs:null,as:null,upcoming:true,note:'Postponed Aug 2'},
  ]},
  {round:3, games:[
    {home:'Clydesdales',away:'Bears',hs:6,as:38},
    {home:'Capras',away:'Magpies',hs:20,as:32},
    {home:'Cutters',away:'Tigers',hs:18,as:32},
    {home:'Jets',away:'Seagulls',hs:34,as:6},
    {home:'Falcons',away:'Pride',hs:32,as:20},
    {home:'Devils',away:'WM Seagulls',hs:28,as:18},
  ]},
];

const R4_FIXTURES = [
  {date:'Sat 27 Jun',time:'1:20pm AEST',venue:'Barlow Park, Cairns',home:'Pride',away:'WM Seagulls'},
  {date:'Sat 27 Jun',time:'2:30pm AEST',venue:'Totally Workwear Stadium, Ipswich',home:'Tigers',away:'Jets'},
  {date:'Sat 27 Jun',time:'4:45pm AEST',venue:'UAA Park, Gold Coast',home:'Bears',away:'Seagulls'},
  {date:'Sun 28 Jun',time:'12:05pm AEST',venue:'Aurizon Stadium, Rockhampton',home:'Capras',away:'Cutters'},
  {date:'Sun 28 Jun',time:'12:30pm AEST',venue:'Toowoomba Sports Ground',home:'Clydesdales',away:'Falcons'},
  {date:'Sun 28 Jun',time:'1:50pm AEST',venue:'Davies Park, Brisbane',home:'Magpies',away:'Devils'},
];

// ===================== COMPUTE STATS =====================
function computeStats() {
  const s = {};
  for (const t of Object.keys(TEAM_COLORS)) {
    s[t] = {w:0,l:0,d:0,pf:0,pa:0,gp:0,results:[],byes:0};
  }
  for (const rd of BMD_ROUNDS) {
    for (const g of rd.games) {
      if (g.upcoming) { s[g.home].byes++; s[g.away].byes++; continue; }
      s[g.home].gp++; s[g.away].gp++;
      s[g.home].pf += g.hs; s[g.home].pa += g.as;
      s[g.away].pf += g.as; s[g.away].pa += g.hs;
      if (g.hs > g.as) {
        s[g.home].w++; s[g.away].l++;
        s[g.home].results.push('W'); s[g.away].results.push('L');
      } else if (g.as > g.hs) {
        s[g.away].w++; s[g.home].l++;
        s[g.away].results.push('W'); s[g.home].results.push('L');
      } else {
        s[g.home].d++; s[g.away].d++;
        s[g.home].results.push('D'); s[g.away].results.push('D');
      }
    }
  }
  for (const t of Object.keys(s)) {
    const ts = s[t];
    ts.pts = ts.w * 2 + ts.d;
    ts.diff = ts.pf - ts.pa;
    ts.pct = ts.gp > 0 ? ts.pf / (ts.pf + ts.pa) * 100 : 0;
    ts.avgPF = ts.gp > 0 ? (ts.pf / ts.gp).toFixed(1) : '-';
    ts.avgPA = ts.gp > 0 ? (ts.pa / ts.gp).toFixed(1) : '-';
  }
  return s;
}

function sortedLadder(s) {
  return Object.entries(s).sort((a,b) => {
    if (b[1].pts !== a[1].pts) return b[1].pts - a[1].pts;
    if (b[1].diff !== a[1].diff) return b[1].diff - a[1].diff;
    return b[1].pct - a[1].pct;
  });
}

function formHtml(results) {
  if (!results.length) return '<span style="color:var(--muted);font-size:11px;">—</span>';
  return results.slice(-5).map(r => `<span class="form-pill form-${r}">${r}</span>`).join('');
}

function dot(team, size=10) {
  const c = TEAM_COLORS[team]||'#888';
  return `<span class="team-dot" style="background:${c};width:${size}px;height:${size}px;"></span>`;
}

function diffStr(d) {
  return d >= 0 ? `<span class="diff-pos">+${d}</span>` : `<span class="diff-neg">${d}</span>`;
}

// ===================== SCOUT DATA =====================
const SCOUT = {

// ===================== RENDER FUNCTIONS =====================
const STATS = computeStats();
const LADDER = sortedLadder(STATS);

// Update hero stats
(function(){
  let totalPF=0, totalGames=0;
  for (const [t,s] of Object.entries(STATS)) { totalPF+=s.pf; totalGames+=s.gp; }
  const avg = totalGames > 0 ? (totalPF/totalGames).toFixed(1) : '-';
  document.getElementById('h-avg').textContent = avg;
  // top attack
  const topAtk = Object.entries(STATS).sort((a,b)=>b[1].pf-a[1].pf)[0];
  document.getElementById('h-top').textContent = TEAM_SHORT[topAtk[0]]+' '+topAtk[1].pf;
  // best defence
  const bestDef = Object.entries(STATS).filter(([t,s])=>s.gp>=2).sort((a,b)=>a[1].pa-b[1].pa)[0];
  document.getElementById('h-def').textContent = TEAM_SHORT[bestDef[0]]+' '+bestDef[1].pa;
})();

function showTab(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  const idx = ['overview','r4','ladder','charts','scouts','results','matrix','profiles','attack','defence','tryzone'].indexOf(id);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  const renders = {
    overview:renderOverview, r4:renderR4, ladder:renderLadder,
    charts:renderCharts, scouts:renderScouts, results:renderResults, matrix:renderMatrix,
    profiles:renderProfiles, attack:renderAttack, defence:renderDefence, tryzone:renderTryZone
  };
  renders[id]();
}

function renderOverview() {
  const el = document.getElementById('panel-overview');

  // Season summary
  let totalGames=0, totalPF=0, biggest={m:0, desc:''}, maxScore=0, maxTeam='';
  for (const rd of BMD_ROUNDS) {
    for (const g of rd.games) {
      if (g.upcoming) continue;
      totalGames++;
      totalPF += g.hs + g.as;
      const margin = Math.abs(g.hs - g.as);
      if (margin > biggest.m) {
        biggest.m = margin;
        biggest.desc = `${g.away} d. ${g.home} ${g.as}-${g.hs}`;
        if (g.hs > g.as) biggest.desc = `${g.home} d. ${g.away} ${g.hs}-${g.as}`;

      if (g.hs > maxScore) { maxScore=g.hs; maxTeam=g.home; }

// ---- CHARTS (UPGRADED) ----
function renderCharts() {
  const el = document.getElementById('panel-charts');

  // Scatter data
  const scatterTeams = Object.entries(STATS).filter(([t,s])=>s.gp>0);
  const maxPF = Math.max(...scatterTeams.map(([t,s])=>s.pf));
  const maxPA = Math.max(...scatterTeams.map(([t,s])=>s.pa));
  const W=500, H=340, PAD=50;
  const sx = v => PAD + (v/100) * (W-PAD*2);
  const sy = v => PAD + (v/100) * (H-PAD*2);

  function toSx(pf) { return PAD + (pf/100)*(W-PAD*2); }
  function toSy(pa) { return PAD + (pa/100)*(H-PAD*2); }

  const dots = scatterTeams.map(([t,s])=>{
    const x = toSx(s.pf);
    const y = toSy(s.pa);
    const col = TEAM_COLORS[t]||'#888';
    const initials = TEAM_SHORT[t]||t.slice(0,3);
    return `<g>
      <circle cx="${x}" cy="${y}" r="18" fill="${col}" opacity="0.85"/>
      <text x="${x}" y="${y+4}" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">${initials}</text>
    </g>`;
  }).join('');

  const scatterSvg = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <rect width="${W}" height="${H}" fill="#13131f" rx="8"/>
    <!-- Grid lines -->
    ${[0,25,50,75,100].map(v=>`
      <line x1="${toSx(v)}" y1="${PAD}" x2="${toSx(v)}" y2="${H-PAD}" stroke="#222236" stroke-width="1"/>
      <line x1="${PAD}" y1="${toSy(v)}" x2="${W-PAD}" y2="${toSy(v)}" stroke="#222236" stroke-width="1"/>
    `).join('')}
    <!-- Quadrant shading -->
    <rect x="${PAD}" y="${PAD}" width="${(W-PAD*2)/2}" height="${(H-PAD*2)/2}" fill="rgba(46,204,113,0.04)"/>
    <rect x="${toSx(50)}" y="${toSy(50)}" width="${(W-PAD*2)/2}" height="${(H-PAD*2)/2}" fill="rgba(231,76,60,0.04)"/>
    <!-- Quadrant labels -->
    <text x="${PAD+10}" y="${PAD+16}" fill="rgba(46,204,113,0.4)" font-size="10">Low Attack / Low Defence</text>
    <text x="${toSx(55)}" y="${PAD+16}" fill="rgba(46,204,113,0.6)" font-size="10">High Attack / Low Defence ✓</text>
    <text x="${PAD+10}" y="${H-PAD-8}" fill="rgba(231,76,60,0.4)" font-size="10">Low Attack / High Defence ✗</text>
    <text x="${toSx(55)}" y="${H-PAD-8}" fill="rgba(231,76,60,0.6)" font-size="10">High Attack / High Defence</text>
    <!-- Axes -->
    <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="#444" stroke-width="1.5"/>
    <line x1="${PAD}" y1="${PAD}" x2="${PAD}" y2="${H-PAD}" stroke="#444" stroke-width="1.5"/>
    <text x="${W/2}" y="${H-8}" text-anchor="middle" fill="#888" font-size="11">Points For →</text>
    <text x="12" y="${H/2}" text-anchor="middle" fill="#888" font-size="11" transform="rotate(-90,12,${H/2})">← Points Against →</text>
    ${dots}
    <!-- Axis labels -->
    ${[0,25,50,75,100].map(v=>`
      <text x="${toSx(v)}" y="${H-PAD+14}" text-anchor="middle" fill="#666" font-size="9">${v}</text>
      <text x="${PAD-4}" y="${toSy(v)+4}" text-anchor="end" fill="#666" font-size="9">${v}</text>
    `).join('')}
  </svg>`;

  // Bar chart: points scored per team
  const sortedAtk = Object.entries(STATS).sort((a,b)=>b[1].pf-a[1].pf);
  const barH = 26, barGap=4, barPad=8, barLabelW=90;
  const bW=500, bH=sortedAtk.length*(barH+barGap)+barPad*2;
  const barMaxPF = sortedAtk[0][1].pf;
  const atkBars = sortedAtk.map(([t,s],i)=>{
    const bLen = (s.pf / barMaxPF) * (bW - barLabelW - 60);
    const y = barPad + i*(barH+barGap);
    return `<g>
      <text x="0" y="${y+barH*0.7}" fill="#bbb" font-size="10" font-weight="bold">${t}</text>
      <rect x="${barLabelW}" y="${y}" width="${bLen}" height="${barH}" fill="${TEAM_COLORS[t]}" opacity="0.85" rx="3"/>
      <text x="${barLabelW+bLen+6}" y="${y+barH*0.7}" fill="#ccc" font-size="11" font-weight="bold">${s.pf}</text>
      <text x="${barLabelW+bLen+36}" y="${y+barH*0.7}" fill="var(--muted)" font-size="9">${s.gp}gp</text>
    </g>`;
  }).join('');

  // Bar chart: points conceded
  const sortedDef = Object.entries(STATS).filter(([t,s])=>s.gp>0).sort((a,b)=>a[1].pa-b[1].pa);
  const defMaxPA = Math.max(...sortedDef.map(([t,s])=>s.pa));
  const defBH = sortedDef.length*(barH+barGap)+barPad*2;
  const defBars = sortedDef.map(([t,s],i)=>{
    const bLen = (s.pa / defMaxPA) * (bW - barLabelW - 60);
    const y = barPad + i*(barH+barGap);
    const col = s.pa < 40 ? '#2ecc71' : s.pa < 60 ? '#F5A623' : '#e74c3c';
    return `<g>
      <text x="0" y="${y+barH*0.7}" fill="#bbb" font-size="10" font-weight="bold">${t}</text>
      <rect x="${barLabelW}" y="${y}" width="${bLen}" height="${barH}" fill="${col}" opacity="0.7" rx="3"/>
      <text x="${barLabelW+bLen+6}" y="${y+barH*0.7}" fill="#ccc" font-size="11" font-weight="bold">${s.pa}</text>
    </g>`;
  }).join('');

  // Round-by-round scoring per team (mini spark)
  const teamRoundScores = {};
  for (const t of Object.keys(TEAM_COLORS)) teamRoundScores[t] = [];
  for (const rd of BMD_ROUNDS) {
    for (const g of rd.games) {
      if (g.upcoming) { teamRoundScores[g.home].push(null); teamRoundScores[g.away].push(null); continue; }
      teamRoundScores[g.home].push({scored:g.hs, conceded:g.as, result:g.hs>g.as?'W':g.hs<g.as?'L':'D'});
      teamRoundScores[g.away].push({scored:g.as, conceded:g.hs, result:g.as>g.hs?'W':g.as<g.hs?'L':'D'});
    }
  }

  el.innerHTML = `
  <div class="card">
    <div class="card-title">Attack vs Defence — Scatter Chart</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">X-axis = Points Scored (higher = better attack). Y-axis = Points Conceded (lower = better defence). Top-right quadrant = high attack, high conceding. Top-left = best position overall.</p>
    <div class="chart-container">${scatterSvg}</div>
    <div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--muted);">
      <span style="color:#2ecc71;">● Top-left: High attack, low conceding (IDEAL)</span>
      <span style="color:#e74c3c;">● Bottom-right: Low attack, high conceding (DANGER)</span>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">Points Scored (PF) — All Teams</div>

          <rect width="${bW}" height="${bH}" fill="#13131f" rx="8"/>
          ${atkBars}
        </svg>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Points Conceded (PA) — Best to Worst</div>
      <div class="chart-container">
        <svg viewBox="0 0 ${bW} ${defBH}" width="100%" xmlns="http://www.w3.org/2000/svg">
          <rect width="${bW}" height="${defBH}" fill="#13131f" rx="8"/>
          ${defBars}
        </svg>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Round-by-Round Scoring Tracker</div>
    <div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <tr>
        <th style="text-align:left;padding:8px;color:var(--muted);font-size:11px;min-width:100px;">Team</th>
        <th style="color:var(--muted);font-size:11px;padding:8px;text-align:center;">R1</th>
        <th style="color:var(--muted);font-size:11px;padding:8px;text-align:center;">R2</th>
        <th style="color:var(--muted);font-size:11px;padding:8px;text-align:center;">R3</th>
        <th style="color:var(--muted);font-size:11px;padding:8px;text-align:center;">Avg Scored</th>
        <th style="color:var(--muted);font-size:11px;padding:8px;text-align:center;">Avg Conceded</th>
        <th style="color:var(--muted);font-size:11px;padding:8px;text-align:center;">Trend</th>
      </tr>
      ${LADDER.map(([t,s])=>{
        const scores = teamRoundScores[t];
        const validScores = scores.filter(s=>s!==null);
        const avg = validScores.length>0 ? (validScores.reduce((a,b)=>a+b.scored,0)/validScores.length).toFixed(1) : '-';
        const avgA = validScores.length>0 ? (validScores.reduce((a,b)=>a+b.conceded,0)/validScores.length).toFixed(1) : '-';
        const trend = validScores.length >= 2 ? (validScores[validScores.length-1].scored > validScores[0].scored ? '↑' : validScores[validScores.length-1].scored < validScores[0].scored ? '↓' : '→') : '—';
        const tCol = trend==='↑'?'#2ecc71':trend==='↓'?'#e74c3c':'#888';
        return `<tr style="border-bottom:1px solid rgba(34,34,54,.4);">
          <td style="padding:8px;font-weight:700;">${dot(t,8)}${t}</td>
          ${scores.map(sc=>{
            if (sc===null) return `<td style="padding:8px;text-align:center;"><span style="font-size:9px;color:var(--gold);padding:2px 6px;background:rgba(245,166,35,.1);border-radius:4px;">PST</span></td>`;
            const col = sc.result==='W'?'rgba(46,204,113,.15)':sc.result==='L'?'rgba(231,76,60,.15)':'rgba(255,255,255,.05)';
            const rCol = sc.result==='W'?'#2ecc71':sc.result==='L'?'#e74c3c':'#888';
            return `<td style="padding:8px;text-align:center;background:${col};font-weight:700;color:${rCol};border-radius:4px;">${sc.scored}<br><span style="font-size:9px;color:${rCol};opacity:0.7;">(${sc.result})</span></td>`;
          }).join('')}
          <td style="padding:8px;text-align:center;font-weight:700;color:var(--gold);">${avg}</td>

          <td style="padding:8px;text-align:center;font-weight:900;color:${tCol};font-size:18px;">${trend}</td>

  <div class="grid-2" style="margin-top:16px;">

      <div class="card-title">⚔️ Avg Points Scored/Game (Normalized)</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Per-game average removes bias from teams with only 2 games played (Jets, WM Seagulls).</div>
      ${[...LADDER].sort((a,b)=>parseFloat(b[1].avgPF)-parseFloat(a[1].avgPF)).map(([t,s])=>{
        const avg=parseFloat(s.avgPF)||0;
        const maxAvg=parseFloat([...LADDER].sort((a,b)=>parseFloat(b[1].avgPF)-parseFloat(a[1].avgPF))[0][1].avgPF)||1;
        const pct=Math.round(avg/maxAvg*100);

          <span style="font-size:12px;font-weight:800;color:${col};min-width:38px;text-align:right;">${s.avgPF}</span>
          <span style="font-size:10px;color:var(--muted);min-width:24px;">${s.gp}gp</span>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-title">🛡️ Avg Points Conceded/Game (Normalized)</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Best defensive teams rise — Bears' 6.7/gm average is the standout across 3 rounds.</div>
      ${[...LADDER].sort((a,b)=>parseFloat(a[1].avgPA)-parseFloat(b[1].avgPA)).map(([t,s])=>{
        const avg=parseFloat(s.avgPA)||0;
        const maxAvg=parseFloat([...LADDER].sort((a,b)=>parseFloat(b[1].avgPA)-parseFloat(a[1].avgPA))[0][1].avgPA)||1;
        const pct=Math.round(avg/maxAvg*100);
        const col=avg<=15?'#4ADE80':avg<=22?'#FACC15':avg<=28?'#F97316':'#F87171';
        return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);">
          ${dot(t,8)}<span style="flex:1;font-size:11px;">${t}</span>
          <div style="flex:2;height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${col};border-radius:5px;"></div></div>
          <span style="font-size:12px;font-weight:800;color:${col};min-width:38px;text-align:right;">${s.avgPA}</span>
          <span style="font-size:10px;color:var(--muted);min-width:24px;">${s.gp}gp</span>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- NEW: Scoring consistency + win margin distribution -->
  <div class="grid-2" style="margin-top:16px;">
    <div class="card">
      <div class="card-title">📐 Scoring Consistency (σ Std Deviation)</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Lower σ = consistent scorer. High σ = unpredictable — can score big or go quiet.</div>
      ${(()=>{
        const sdFn=arr=>{if(arr.length<2)return null;const m=arr.reduce((a,b)=>a+b,0)/arr.length;return +Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length).toFixed(1);};
        const teamScores={};
        for(const t of Object.keys(TEAM_COLORS))teamScores[t]=[];
        for(const rd of BMD_ROUNDS)for(const g of rd.games){
          if(g.upcoming)continue;
          teamScores[g.home].push(g.hs);teamScores[g.away].push(g.as);
        }
        const ranked=LADDER.map(([t,s])=>({t,sd:sdFn(teamScores[t])})).filter(x=>x.sd!==null).sort((a,b)=>a.sd-b.sd);
        const maxSd=Math.max(...ranked.map(x=>x.sd));
        return ranked.map(x=>{
          const pct=maxSd>0?Math.round(x.sd/maxSd*100):0;
          const col=x.sd<=5?'#4ADE80':x.sd<=10?'#FACC15':'#F87171';
          return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);">
            ${dot(x.t,8)}<span style="flex:1;font-size:11px;">${x.t}</span>
            <div style="flex:2;height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${col};border-radius:5px;"></div></div>
            <span style="font-size:12px;font-weight:800;color:${col};min-width:38px;text-align:right;">σ${x.sd}</span>
          </div>`;
        }).join('');
      })()}
    </div>
    <div class="card">
      <div class="card-title">📏 Win Margin Distribution</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">How closely contested are the BMD Premiership's results so far?</div>
      ${(()=>{
        const bands={'1–6':0,'7–12':0,'13–20':0,'21–30':0,'31+':0};
        for(const rd of BMD_ROUNDS)for(const g of rd.games){
          if(g.upcoming||g.hs==null)continue;
          const mg=Math.abs(g.hs-g.as);
          if(mg===0)return;
          if(mg<=6)bands['1–6']++;else if(mg<=12)bands['7–12']++;
          else if(mg<=20)bands['13–20']++;else if(mg<=30)bands['21–30']++;
          else bands['31+']++;
        }
        const maxB=Math.max(...Object.values(bands));
        return Object.entries(bands).map(([b,c])=>{
          const pct=maxB>0?Math.round(c/maxB*100):0;
          const col=b==='1–6'?'#4ADE80':b==='7–12'?'#FACC15':b==='13–20'?'#F97316':b==='21–30'?'#F87171':'#E74C3C';
          return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);">
            <span style="width:48px;font-size:11px;color:var(--muted);">By ${b}</span>
            <div style="flex:1;height:12px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${col};border-radius:6px;"></div></div>
            <span style="font-size:12px;font-weight:800;color:${col};min-width:24px;">${c}</span>
          </div>`;
        }).join('');
      })()}
    </div>
  </div>

  <!-- NEW: Head-to-head win rate table -->
  <div class="card" style="margin-top:16px;">
    <div class="card-title">🔬 Competition Analysis — Attack vs Defence Quadrants</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Teams classified by their avg pts scored AND conceded. Based on NRL research (Wedding et al., 2022): "Attacking Play" and "Defensive Errors" together predict <strong style="color:var(--text);">80% of match outcomes</strong> in elite rugby league.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      ${[
        {label:'✅ Elite: High Attack + Good Defence',bg:'rgba(46,204,113,.07)',border:'rgba(46,204,113,.25)',filter:([t,s])=>parseFloat(s.avgPF)>=20&&parseFloat(s.avgPA)<=20},
        {label:'⚡ Dangerous: High Attack, Leaky Defence',bg:'rgba(245,166,35,.07)',border:'rgba(245,166,35,.25)',filter:([t,s])=>parseFloat(s.avgPF)>=20&&parseFloat(s.avgPA)>20},
        {label:'🛡️ Defensive: Low Attack, Solid Defence',bg:'rgba(52,152,219,.07)',border:'rgba(52,152,219,.25)',filter:([t,s])=>parseFloat(s.avgPF)<20&&parseFloat(s.avgPA)<=20},
        {label:'⚠️ Struggling: Low Attack + Leaky Defence',bg:'rgba(231,76,60,.07)',border:'rgba(231,76,60,.25)',filter:([t,s])=>parseFloat(s.avgPF)<20&&parseFloat(s.avgPA)>20},
      ].map(q=>{
        const teams=LADDER.filter(q.filter);
        return`<div style="background:${q.bg};border:1px solid ${q.border};border-radius:10px;padding:14px;">
          <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;">${q.label}</div>
          ${teams.length?teams.map(([t,s])=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;">
            ${dot(t,8)}<span style="font-size:11px;">${t}</span>
            <span style="font-size:10px;color:var(--muted);margin-left:auto;">${s.avgPF}F / ${s.avgPA}A</span>
          </div>`).join(''):'<div style="font-size:11px;color:var(--muted);">No teams in this quadrant</div>'}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ---- RESULTS ----
function renderResults() {
  const el = document.getElementById('panel-results');
  if (el.dataset.rendered) return;
  el.dataset.rendered = '1';

  let html = '';
  for (let ri = BMD_ROUNDS.length-1; ri >= 0; ri--) {
    const rd = BMD_ROUNDS[ri];
    html += `<div class="round-header">Round ${rd.round}</div>`;
    for (const g of rd.games) {
      if (g.upcoming) {
        html += `<div class="match-card">
          <div class="match-teams">
            <div class="match-team home">${g.home}</div>
            <div class="match-score" style="background:rgba(123,47,190,.2);border:1px solid rgba(123,47,190,.3);font-size:12px;color:var(--purple);">PST</div>
            <div class="match-team">${g.away}</div>
          </div>
          <div class="match-meta">${g.note||'Upcoming'}</div>
        </div>`;
        continue;
      }
      const homeWon = g.hs > g.as;
      const awayWon = g.as > g.hs;
      const margin = Math.abs(g.hs - g.as);
      html += `<div class="match-card">
        <div class="match-teams">
          <div class="match-team home ${homeWon?'winner':''}">${g.home}</div>
          <div>
            <div class="match-score"><span>${g.hs}</span> – <span>${g.as}</span></div>
            <div class="match-margin">margin: ${margin}</div>
          </div>
          <div class="match-team ${awayWon?'winner':''}">${g.away}</div>
        </div>
      </div>`;
    }
  }
  el.innerHTML = html;
}

// ---- MATRIX ----
function renderMatrix() {
  const el = document.getElementById('panel-matrix');
  if (el.dataset.rendered) return;
  el.dataset.rendered = '1';

  const teams = LADDER.map(([t])=>t);
  // Build results object: results[homeTeam][awayTeam] = {hs, as}
  const results = {};
  for (const t of teams) results[t]={};
  for (const rd of BMD_ROUNDS) {
    for (const g of rd.games) {
      if (g.upcoming) continue;
      results[g.home][g.away] = {hs:g.hs, as:g.as};
    }
  }

  const shortNames = teams.map(t=>TEAM_SHORT[t]||t.slice(0,3));

  let html = `<div class="card">
    <div class="card-title">Head-to-Head Results Matrix</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Read row team vs column team. Result shown from row team's perspective. W=Win, L=Loss. Score shown as row score–col score.</p>
    <div style="overflow-x:auto;">
    <table class="matrix-table">
      <thead>
        <tr>
          <th class="row-header">vs</th>
          ${shortNames.map((s,i)=>`<th style="color:${TEAM_COLORS[teams[i]]};">${s}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${teams.map((rowTeam,ri)=>`
          <tr>
            <td class="row-header">${dot(rowTeam,8)}${rowTeam}</td>
            ${teams.map((colTeam,ci)=>{
              if (ri===ci) return `<td class="matrix-self">—</td>`;
              if (results[rowTeam][colTeam]) {
                const r = results[rowTeam][colTeam];
                const win = r.hs > r.as;
                return `<td class="${win?'matrix-W':'matrix-L'}">${win?'W':'L'}<br><span style="font-size:9px;">${r.hs}-${r.as}</span></td>`;
              }
              if (results[colTeam][rowTeam]) {
                const r = results[colTeam][rowTeam];
                const win = r.as > r.hs;
                return `<td class="${win?'matrix-W':'matrix-L'}">${win?'W':'L'}<br><span style="font-size:9px;">${r.as}-${r.hs}</span></td>`;
              }
              return `<td class="matrix-none">·</td>`;
            }).join('')}
          </tr>
        `).join('')}
      </tbody>
    </table>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--muted);">· = not yet played | W=Win L=Loss from row team's perspective. Only 3 rounds completed — most pairs yet to meet.</div>
  </div>

  <div class="card">
    <div class="card-title">Schedule Analysis — Who's Played Who</div>
    <div class="grid-3">
      ${teams.map(t=>{
        const opponents = [];
        for (const rd of BMD_ROUNDS) {
          for (const g of rd.games) {
            if (g.upcoming) continue;
            if (g.home===t) opponents.push({opp:g.away, won:g.hs>g.as, score:`${g.hs}-${g.as}`});
            if (g.away===t) opponents.push({opp:g.home, won:g.as>g.hs, score:`${g.as}-${g.hs}`});
          }
        }
        return `<div style="background:var(--card2);border-radius:8px;padding:12px;">
          <div style="font-weight:700;margin-bottom:8px;">${dot(t,10)}${t}</div>
          ${opponents.map(o=>`
            <div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(34,34,54,.4);">
              <span>${o.opp}</span>
              <span style="font-weight:700;color:${o.won?'#2ecc71':'#e74c3c'};">${o.won?'W':'L'} ${o.score}</span>
            </div>
          `).join('')}
          ${opponents.length===0?'<div style="font-size:11px;color:var(--muted);">No completed games</div>':''}
        </div>`;
      }).join('')}
    </div>
  </div>`;

  el.innerHTML = html;
}

// ---- PROFILES ----
function renderProfiles() {
  const el = document.getElementById('panel-profiles');
  if (el.innerHTML.trim()) return;
  const ladder = sortedLadder(STATS);
  const totalRounds = BMD_ROUNDS.length;
  const sectionStyle = 'background:var(--card);border-radius:12px;padding:18px;margin-bottom:18px;';
  const headStyle = 'font-size:15px;font-weight:700;color:var(--accent);margin-bottom:14px;';

  // Team cards
  let cards = ladder.map(([team, s], i) => {
    const c = TEAM_COLORS[team] || '#888';
    const pos = i + 1;
    const pf = s.pf; const pa = s.pa;
    const avgPF = s.gp > 0 ? (pf/s.gp).toFixed(1) : '-';
    const avgPA = s.gp > 0 ? (pa/s.gp).toFixed(1) : '-';
    const pct = s.gp > 0 ? (pf/(pf+pa)*100).toFixed(1) : '-';
    const diff = pf - pa;
    const diffColor = diff >= 0 ? '#2ecc71' : '#e74c3c';
    const winRate = s.gp > 0 ? ((s.w/s.gp)*100).toFixed(0) : 0;

    const scored = [];
    const conceded = [];

    const maxScore = scored.length > 0 ? Math.max(...scored) : 0;

    const styleColor = avgF >= 28 ? '#e67e22' : avgF >= 22 ? '#3498db' : avgF >= 16 ? '#27ae60' : '#95a5a6';

        <div style="text-align:right;">
          <div style="font-size:13px;font-weight:700;color:${styleColor};">${style}</div>
          <div style="font-size:11px;color:var(--muted);">Avg ${avgPF} pts/game</div>
        </div>
      </div>
      <div style="padding:14px 18px;">
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;">
          <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px;">
            <div style="font-size:17px;font-weight:800;color:#2ecc71;">${avgPF}</div>
            <div style="font-size:9px;color:var(--muted);text-transform:uppercase;">Avg For</div>
          </div>
          <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px;">
            <div style="font-size:17px;font-weight:800;color:#e74c3c;">${avgPA}</div>
            <div style="font-size:9px;color:var(--muted);text-transform:uppercase;">Avg Agnst</div>
          </div>

            <div style="font-size:17px;font-weight:800;color:${diffColor};">${diff>=0?'+':''}${diff}</div>
            <div style="font-size:9px;color:var(--muted);text-transform:uppercase;">Diff</div>
          </div>
          <div style="text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px;">

            <div style="font-size:9px;color:var(--muted);text-transform:uppercase;">Win Rate</div>

  el.innerHTML = `<div style="padding:16px;">

// ---- ATTACK ----
function renderAttack() {
  const el = document.getElementById('panel-attack');
  if (el.innerHTML.trim()) return;
  const sectionStyle = 'background:var(--card);border-radius:12px;padding:18px;margin-bottom:18px;';
  const headStyle = 'font-size:15px;font-weight:700;color:var(--accent);margin-bottom:14px;';
  const thStyle = 'padding:8px 10px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border);';
  const tdStyle = 'padding:8px 10px;font-size:13px;border-bottom:1px solid var(--border)15;';

  // Compute attack rating per team
  const teams = Object.entries(STATS).filter(([t,s])=>s.gp>0);
  const maxAvgPF = Math.max(...teams.map(([t,s])=>s.pf/s.gp));
  const ratings = teams.map(([team, s]) => {
    const avgF = s.pf / s.gp;
    // 30+ games
    const big30 = BMD_ROUNDS.flatMap(r=>r.games).filter(g=>!g.upcoming&&((g.home===team&&g.hs>=30)||(g.away===team&&g.as>=30))).length;
    const pct = s.gp > 0 ? s.pf/(s.pf+s.pa)*100 : 0;
    const rating = Math.min(99, Math.round((avgF/maxAvgPF)*55 + big30*4 + pct*0.35));
    // last 3 vs season
    const scores = [];
    for (const rd of BMD_ROUNDS) for (const g of rd.games) {
      if (g.upcoming) continue;
      if (g.home === team) scores.push(g.hs);
      else if (g.away === team) scores.push(g.as);
    }
    const last3Avg = scores.length >= 3 ? (scores.slice(-3).reduce((a,b)=>a+b,0)/3).toFixed(1) : (scores.reduce((a,b)=>a+b,0)/Math.max(scores.length,1)).toFixed(1);
    const seasonAvg = (s.pf/s.gp).toFixed(1);
    const delta = (parseFloat(last3Avg) - parseFloat(seasonAvg)).toFixed(1);
    const traj = delta >= 3 ? '🔺 Improving' : delta <= -3 ? '🔻 Dropping' : '➡️ Stable';
    return { team, s, avgF: avgF.toFixed(1), big30, rating, last3Avg, seasonAvg, delta, traj };
  }).sort((a,b)=>b.rating-a.rating);

  // Top single-game performances from BMD_ROUNDS
  const topGames = [];
  for (const rd of BMD_ROUNDS) {
    for (const g of rd.games) {
      if (g.upcoming) continue;
      topGames.push({r:rd.round, team:g.home, score:g.hs, opp:g.away, oppScore:g.as});
      topGames.push({r:rd.round, team:g.away, score:g.as, opp:g.home, oppScore:g.hs});
    }
  }
  topGames.sort((a,b)=>b.score-a.score);
  const top10 = topGames.slice(0,10);

  // 30+ club
  const club30 = ratings.map(r => ({team:r.team, count:r.big30})).filter(x=>x.count>0).sort((a,b)=>b.count-a.count);

  el.innerHTML = `<div style="padding:16px;">
    <div style="${sectionStyle}">
      <div style="${headStyle}">⚔️ Attack Ratings — Season 2026</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Rating 0–99 composite: avg pts (55pts), 30+ games (4pts each), pts% (0.35pts). Research-backed — attacking play predicts 80% of match outcomes.</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="${thStyle}">#</th>
          <th style="${thStyle}">Team</th>
          <th style="${thStyle}">Rating</th>
          <th style="${thStyle}">Avg PF</th>
          <th style="${thStyle}">30+ Games</th>
          <th style="${thStyle}">Form (L3)</th>
          <th style="${thStyle}">Trajectory</th>
        </tr></thead>
        <tbody>
          ${ratings.map((r,i) => {
            const barColor = r.rating >= 75 ? '#2ecc71' : r.rating >= 55 ? '#f39c12' : '#e74c3c';
            return `<tr>
              <td style="${tdStyle}font-weight:700;">${i+1}</td>
              <td style="${tdStyle}">${dot(r.team,10)} ${r.team}</td>
              <td style="${tdStyle}">
                <div style="display:flex;align-items:center;gap:6px;">
                  <div style="width:50px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
                    <div style="width:${r.rating}%;height:100%;background:${barColor};border-radius:4px;"></div>
                  </div>
                  <strong style="color:${barColor};">${r.rating}</strong>
                </div>
              </td>
              <td style="${tdStyle}font-weight:600;">${r.avgF}</td>
              <td style="${tdStyle}text-align:center;">${r.big30 > 0 ? `<strong style="color:#e67e22;">${r.big30}</strong>` : '—'}</td>
              <td style="${tdStyle}font-weight:600;">${r.last3Avg}</td>
              <td style="${tdStyle}font-size:12px;">${r.traj}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div style="${sectionStyle}">
      <div style="${headStyle}">🏆 Top 10 Single-Game Performances</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="${thStyle}">Rank</th>
          <th style="${thStyle}">Team</th>
          <th style="${thStyle}">Score</th>
          <th style="${thStyle}">vs</th>
          <th style="${thStyle}">Round</th>
          <th style="${thStyle}">Result</th>
        </tr></thead>
        <tbody>
          ${top10.map((g,i)=>`<tr>
            <td style="${tdStyle}font-weight:700;color:var(--accent);">${i+1}</td>
            <td style="${tdStyle}">${dot(g.team,10)} ${g.team}</td>
            <td style="${tdStyle}font-size:16px;font-weight:800;color:#f39c12;">${g.score}</td>
            <td style="${tdStyle}color:var(--muted);">${g.opp} (${g.oppScore})</td>
            <td style="${tdStyle}">R${g.r}</td>
            <td style="${tdStyle}">${g.score>g.oppScore?'<span style="color:#2ecc71;font-weight:700;">W</span>':'<span style="color:#e74c3c;font-weight:700;">L</span>'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div style="${sectionStyle}">
      <div style="${headStyle}">🎯 30+ Club — High-Scoring Games</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Teams that have scored 30+ points in a single game</div>
      ${club30.length > 0 ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;">
        ${club30.map(x=>`<div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center;border-left:4px solid ${TEAM_COLORS[x.team]||'#888'};">
          ${dot(x.team,12)}<br>
          <div style="font-size:12px;font-weight:600;margin:6px 0 2px;">${x.team}</div>
          <div style="font-size:22px;font-weight:800;color:#e67e22;">${x.count}</div>
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;">${x.count===1?'game':'games'}</div>
        </div>`).join('')}
      </div>` : '<div style="color:var(--muted);font-size:13px;">No 30+ point games yet this season.</div>'}
    </div>

    <div style="${sectionStyle}">
      <div style="${headStyle}">📊 Scoring in Wins vs Losses</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="${thStyle}">Team</th>
          <th style="${thStyle}">Avg in Wins</th>
          <th style="${thStyle}">Avg in Losses</th>
          <th style="${thStyle}">Gap</th>
        </tr></thead>
        <tbody>
          ${Object.entries(STATS).filter(([t,s])=>s.gp>0).map(([team,s]) => {
            const games = BMD_ROUNDS.flatMap(r=>r.games).filter(g=>!g.upcoming);
            const wScores = games.filter(g=>g.home===team&&g.hs>g.as).map(g=>g.hs)
              .concat(games.filter(g=>g.away===team&&g.as>g.hs).map(g=>g.as));
            const lScores = games.filter(g=>g.home===team&&g.hs<g.as).map(g=>g.hs)
              .concat(games.filter(g=>g.away===team&&g.as<g.hs).map(g=>g.as));
            const wAvg = wScores.length > 0 ? (wScores.reduce((a,b)=>a+b,0)/wScores.length).toFixed(1) : '—';
            const lAvg = lScores.length > 0 ? (lScores.reduce((a,b)=>a+b,0)/lScores.length).toFixed(1) : '—';
            const gap = wAvg !== '—' && lAvg !== '—' ? (parseFloat(wAvg) - parseFloat(lAvg)).toFixed(1) : '—';
            return `<tr>
              <td style="${tdStyle}">${dot(team,10)} ${team}</td>
              <td style="${tdStyle}font-weight:700;color:#2ecc71;">${wAvg}</td>
              <td style="${tdStyle}font-weight:700;color:#e74c3c;">${lAvg}</td>
              <td style="${tdStyle}font-weight:700;color:var(--accent);">${gap !== '—' ? `+${gap}` : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ---- DEFENCE ----
function renderDefence() {
  const el = document.getElementById('panel-defence');
  if (el.innerHTML.trim()) return;
  const sectionStyle = 'background:var(--card);border-radius:12px;padding:18px;margin-bottom:18px;';
  const headStyle = 'font-size:15px;font-weight:700;color:var(--accent);margin-bottom:14px;';
  const thStyle = 'padding:8px 10px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border);';
  const tdStyle = 'padding:8px 10px;font-size:13px;border-bottom:1px solid var(--border)15;';

  const teams = Object.entries(STATS).filter(([t,s])=>s.gp>0);
  const maxAvgPA = Math.max(...teams.map(([t,s])=>s.pa/s.gp));

  const defRatings = teams.map(([team, s]) => {
    const avgA = s.pa / s.gp;
    // Brick wall = conceded < 20
    const allGames = BMD_ROUNDS.flatMap(r=>r.games).filter(g=>!g.upcoming);
    const brickWall = allGames.filter(g=>(g.home===team&&g.as<20)||(g.away===team&&g.hs<20)).length;
    // Defensive collapse = conceded 38+
    const collapse = allGames.filter(g=>(g.home===team&&g.as>=38)||(g.away===team&&g.hs>=38)).length;
    // Scores conceded
    const conceded = [];
    for (const rd of BMD_ROUNDS) for (const g of rd.games) {
      if (g.upcoming) continue;
      if (g.home === team) conceded.push(g.as);
      else if (g.away === team) conceded.push(g.hs);
    }
    // Std dev
    const mean = conceded.reduce((a,b)=>a+b,0)/Math.max(conceded.length,1);
    const sd = Math.sqrt(conceded.reduce((a,b)=>a+(b-mean)**2,0)/Math.max(conceded.length,1)).toFixed(1);
    const grade = sd <= 5 ? 'Elite 🏆' : sd <= 10 ? 'Consistent ✅' : sd <= 16 ? 'Variable ⚠️' : 'Unreliable ❌';
    const rating = Math.min(99, Math.round((1 - avgA/maxAvgPA)*60 + brickWall*4 + Math.max(0, 15 - collapse*6)));
    // last 3 conceded
    const last3Avg = conceded.length >= 3 ? (conceded.slice(-3).reduce((a,b)=>a+b,0)/3).toFixed(1) : (conceded.reduce((a,b)=>a+b,0)/Math.max(conceded.length,1)).toFixed(1);
    const seasonAvg = (s.pa/s.gp).toFixed(1);
    const delta = (parseFloat(last3Avg) - parseFloat(seasonAvg)).toFixed(1);
    const traj = delta <= -3 ? '🔺 Improving' : delta >= 3 ? '🔻 Dropping' : '➡️ Stable';
    return { team, s, avgA: avgA.toFixed(1), brickWall, collapse, sd, grade, rating, last3Avg, seasonAvg, delta, traj };
  }).sort((a,b)=>b.rating-a.rating);

  // Brick wall games
  const brickGames = [];
  for (const rd of BMD_ROUNDS) for (const g of rd.games) {
    if (g.upcoming) continue;
    if (g.as < 20) brickGames.push({r:rd.round, team:g.home, conceded:g.as, scored:g.hs, opp:g.away});
    if (g.hs < 20) brickGames.push({r:rd.round, team:g.away, conceded:g.hs, scored:g.as, opp:g.home});
  }
  brickGames.sort((a,b)=>a.conceded-b.conceded);

  // Collapse games
  const collapseGames = [];
  for (const rd of BMD_ROUNDS) for (const g of rd.games) {
    if (g.upcoming) continue;
    if (g.as >= 38) collapseGames.push({r:rd.round, team:g.home, conceded:g.as, opp:g.away});
    if (g.hs >= 38) collapseGames.push({r:rd.round, team:g.away, conceded:g.hs, opp:g.home});
  }

  el.innerHTML = `<div style="padding:16px;">
    <div style="${sectionStyle}">
      <div style="${headStyle}">🛡️ Defence Ratings — Season 2026</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Rating 0–99 composite: avg pts conceded (60pts), brick wall games &lt;20pts (4pts each), collapse penalty (38+pts conceded). Lower points against = higher rating.</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="${thStyle}">#</th>
          <th style="${thStyle}">Team</th>
          <th style="${thStyle}">Rating</th>
          <th style="${thStyle}">Avg PA</th>
          <th style="${thStyle}">Brick Walls</th>
          <th style="${thStyle}">Collapses</th>
          <th style="${thStyle}">Consistency</th>
          <th style="${thStyle}">Trajectory</th>
        </tr></thead>
        <tbody>
          ${defRatings.map((r,i) => {
            const barColor = r.rating >= 75 ? '#2ecc71' : r.rating >= 50 ? '#f39c12' : '#e74c3c';
            return `<tr>
              <td style="${tdStyle}font-weight:700;">${i+1}</td>
              <td style="${tdStyle}">${dot(r.team,10)} ${r.team}</td>
              <td style="${tdStyle}">
                <div style="display:flex;align-items:center;gap:6px;">
                  <div style="width:50px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
                    <div style="width:${r.rating}%;height:100%;background:${barColor};border-radius:4px;"></div>
                  </div>
                  <strong style="color:${barColor};">${r.rating}</strong>
                </div>
              </td>
              <td style="${tdStyle}font-weight:600;color:#e74c3c;">${r.avgA}</td>
              <td style="${tdStyle}text-align:center;">${r.brickWall > 0 ? `<strong style="color:#27ae60;">${r.brickWall}</strong>` : '—'}</td>
              <td style="${tdStyle}text-align:center;">${r.collapse > 0 ? `<strong style="color:#e74c3c;">${r.collapse}</strong>` : '—'}</td>
              <td style="${tdStyle}font-size:11px;">${r.grade} <span style="color:var(--muted);">(σ${r.sd})</span></td>
              <td style="${tdStyle}font-size:12px;">${r.traj}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;">
      <div style="${sectionStyle}margin-bottom:0;">
        <div style="${headStyle}">🧱 Brick Wall Games (&lt;20 pts conceded)</div>
        ${brickGames.length > 0 ? brickGames.map(g=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)15;font-size:13px;">
            <div>${dot(g.team,10)} <strong>${g.team}</strong></div>
            <div style="color:var(--muted);">vs ${g.opp} R${g.r}</div>
            <div style="font-weight:700;color:#27ae60;">Def ${g.conceded} | ${g.scored} Scored</div>
          </div>`).join('') : '<div style="color:var(--muted);font-size:13px;">None yet this season.</div>'}
      </div>
      <div style="${sectionStyle}margin-bottom:0;">
        <div style="${headStyle}">💥 Defensive Collapses (38+ pts conceded)</div>
        ${collapseGames.length > 0 ? collapseGames.map(g=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)15;font-size:13px;">
            <div>${dot(g.team,10)} <strong>${g.team}</strong></div>
            <div style="color:var(--muted);">vs ${g.opp} R${g.r}</div>
            <div style="font-weight:700;color:#e74c3c;">${'🔴'.repeat(Math.min(Math.floor(g.conceded/10),5))} ${g.conceded}</div>
          </div>`).join('') : '<div style="color:var(--muted);font-size:13px;">No collapses yet this season.</div>'}
      </div>
    </div>

    <div style="${sectionStyle}">
      <div style="${headStyle}">📏 Close Game Record (≤6 pts margin)</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Clutch performance metric — teams that win tight games tend to have superior game management, fitness, and mental strength.</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="${thStyle}">Team</th>
          <th style="${thStyle}">W</th>
          <th style="${thStyle}">L</th>
          <th style="${thStyle}">Close W%</th>
          <th style="${thStyle}">Clutch Rating</th>
        </tr></thead>
        <tbody>
          ${Object.entries(STATS).filter(([t,s])=>s.gp>0).map(([team,s]) => {
            const allG = BMD_ROUNDS.flatMap(r=>r.games).filter(g=>!g.upcoming);
            const closeW = allG.filter(g=>{
              const margin = Math.abs(g.hs-g.as);
              if (margin > 6) return false;
              return (g.home===team&&g.hs>g.as)||(g.away===team&&g.as>g.hs);
            }).length;
            const closeL = allG.filter(g=>{
              const margin = Math.abs(g.hs-g.as);
              if (margin > 6) return false;
              return (g.home===team&&g.hs<g.as)||(g.away===team&&g.as<g.hs);
            }).length;
            const total = closeW + closeL;
            const pct = total > 0 ? Math.round(closeW/total*100) : null;
            const clutch = pct !== null ? (pct >= 67 ? '🏆 Elite' : pct >= 50 ? '✅ Strong' : pct > 0 ? '⚠️ Developing' : '❌ Poor') : '—';
            return `<tr>
              <td style="${tdStyle}">${dot(team,10)} ${team}</td>
              <td style="${tdStyle}font-weight:700;color:#2ecc71;">${closeW}</td>
              <td style="${tdStyle}font-weight:700;color:#e74c3c;">${closeL}</td>
              <td style="${tdStyle}font-weight:700;">${pct !== null ? pct+'%' : '—'}</td>
              <td style="${tdStyle}">${clutch}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

    const c = TEAM_COLORS[team] || '#888';
    const favSide = tz.al >= tz.am && tz.al >= tz.ar ? 'Left' : tz.ar >= tz.am && tz.ar >= tz.al ? 'Right' : 'Middle';
    const softSpot = tz.vl >= tz.vm && tz.vl >= tz.vr ? 'Left' : tz.vr >= tz.vm && tz.vr >= tz.vl ? 'Right' : 'Middle';
    return `<div style="background:var(--card);border-radius:10px;padding:14px;border-left:4px solid ${c};margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:14px;font-weight:700;">${dot(team,12)} ${team}</div>
        <div style="font-size:11px;color:var(--muted);">Fav: <strong style="color:#3498db;">${favSide}</strong> · Soft spot: <strong style="color:#e74c3c;">${softSpot}</strong></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;">
        <div>
          <div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:6px;">⚔️ ATTACK DISTRIBUTION</div>
          <div style="display:flex;gap:3px;height:40px;border-radius:6px;overflow:hidden;">
            <div style="flex:${tz.al};background:#3498db22;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#3498db;flex-direction:column;">
              <div>${tz.al}%</div><div style="font-size:8px;color:var(--muted);">LHS</div>
            </div>
            <div style="flex:${tz.am};background:#9b59b622;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#9b59b6;flex-direction:column;">
              <div>${tz.am}%</div><div style="font-size:8px;color:var(--muted);">MID</div>
            </div>
            <div style="flex:${tz.ar};background:#3498db22;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#3498db;flex-direction:column;">
              <div>${tz.ar}%</div><div style="font-size:8px;color:var(--muted);">RHS</div>
            </div>
          </div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:6px;">🛡️ DEFENSIVE VULNERABILITY</div>
          <div style="display:flex;gap:3px;height:40px;border-radius:6px;overflow:hidden;">
            <div style="flex:${tz.vl};background:#e74c3c${tz.vl===Math.max(tz.vl,tz.vm,tz.vr)?'55':'22'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#e74c3c;flex-direction:column;">
              <div>${tz.vl}%</div><div style="font-size:8px;color:var(--muted);">LHS</div>
            </div>
            <div style="flex:${tz.vm};background:#e74c3c${tz.vm===Math.max(tz.vl,tz.vm,tz.vr)?'55':'22'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#e74c3c;flex-direction:column;">
              <div>${tz.vm}%</div><div style="font-size:8px;color:var(--muted);">MID</div>
            </div>
            <div style="flex:${tz.vr};background:#e74c3c${tz.vr===Math.max(tz.vl,tz.vm,tz.vr)?'55':'22'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#e74c3c;flex-direction:column;">
              <div>${tz.vr}%</div><div style="font-size:8px;color:var(--muted);">RHS</div>
            </div>
          </div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);font-style:italic;line-height:1.5;margin-bottom:4px;"><strong style="color:var(--text);">⚔️ ATK:</strong> ${tz.atk}</div>
      <div style="font-size:11px;color:var(--muted);font-style:italic;line-height:1.5;"><strong style="color:var(--text);">🛡️ DEF:</strong> ${tz.def}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div style="padding:16px;">
    <div style="${sectionStyle}">
      <div style="${headStyle}">🗺️ Try Zone Analysis — AI Estimated Model</div>
      <div style="background:#f39c1222;border:1px solid #f39c12;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#f39c12;">
        ⚠️ <strong>AI-Estimated Model:</strong> Try zone distributions are projected from team style, personnel, and observed attacking/defensive patterns. This is not direct try-tracking data from official sources.
      </div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:14px;">
        <thead><tr>
          <th style="${thStyle}">Team</th>
          <th style="${thStyle}">ATK LHS</th>
          <th style="${thStyle}">ATK MID</th>
          <th style="${thStyle}">ATK RHS</th>
          <th style="${thStyle}">Fav Side</th>
          <th style="${thStyle}">VUL LHS</th>
          <th style="${thStyle}">VUL MID</th>
          <th style="${thStyle}">VUL RHS</th>
          <th style="${thStyle}">Soft Spot</th>
        </tr></thead>
        <tbody>
          ${Object.entries(TZ).map(([team, tz]) => {
            const favSide = tz.al >= tz.am && tz.al >= tz.ar ? 'Left' : tz.ar >= tz.am && tz.ar >= tz.al ? 'Right' : 'Middle';
            const softSpot = tz.vl >= tz.vm && tz.vl >= tz.vr ? 'Left' : tz.vr >= tz.vm && tz.vr >= tz.vl ? 'Right' : 'Middle';
            return `<tr>
              <td style="${tdStyle}">${dot(team,10)} ${team}</td>
              ${barCell(tz.al,'#3498db')}
              ${barCell(tz.am,'#9b59b6')}
              ${barCell(tz.ar,'#3498db')}
              <td style="${tdStyle}font-weight:700;color:#3498db;">${favSide}</td>
              ${barCell(tz.vl,'#e74c3c')}
              ${barCell(tz.vm,'#e74c3c')}
              ${barCell(tz.vr,'#e74c3c')}
              <td style="${tdStyle}font-weight:700;color:#e74c3c;">${softSpot}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div style="${sectionStyle}">
      <div style="${headStyle}">🔍 Individual Team Try Zone Profiles</div>
      ${teamCards}
    </div>
  </div>`;
}

// Init
renderOverview();
</script>
</body>
</html>
